<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ARX MESSAGE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --neon-blue: #00f3ff;
            --neon-glow: 0 0 10px rgba(0, 243, 255, 0.5);
            --text-color: #e0e0e0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-color); position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; overflow: hidden; }

        header {
            background: #000; padding: 5px 20px; display: flex; flex-direction: column; align-items: center;
            border-bottom: 1px solid var(--neon-blue); box-shadow: 0 2px 15px rgba(0, 243, 255, 0.2); z-index: 10;
            padding-top: max(5px, env(safe-area-inset-top));
        }
        
        header img { max-height: 55px; width: auto; object-fit: contain; }

        /* AVISO DO CONTADOR */
        #sala-timer {
            font-size: 0.75rem; color: #ff3e3e; text-transform: uppercase; letter-spacing: 1px;
            margin-top: 5px; font-weight: bold; text-shadow: 0 0 5px rgba(255, 62, 62, 0.5);
        }

        #chat-window {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
            background-image: url('planodefundo.png'); background-size: cover; background-position: center; background-attachment: fixed;
        }

        .message-wrapper { display: flex; width: 100%; }
        .message-wrapper.sent { justify-content: flex-end; }
        .message-wrapper.received { justify-content: flex-start; }

        .message {
            max-width: 75%; padding: 12px 16px; border-radius: 18px; position: relative;
            background: rgba(17, 17, 17, 0.9); border: 1px solid #222; font-size: 0.95rem; backdrop-filter: blur(4px);
        }

        .message-wrapper.sent .message { border-bottom-right-radius: 4px; border-color: rgba(0, 243, 255, 0.4); }
        .message-wrapper.received .message { border-bottom-left-radius: 4px; border-color: #444; }

        .timer-bar { height: 2px; background: var(--neon-blue); width: 100%; margin-top: 5px; border-radius: 2px; transition: width 50s linear; }

        #input-area { background: #000; padding: 10px 15px; display: flex; align-items: center; gap: 10px; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        #text-input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 25px; outline: none; }
        
        .action-btn { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; }
        .recording { background: red !important; border-color: red !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        audio { height: 30px; width: 200px; filter: invert(100%); }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <img src="logo.png" alt="ARX">
            <div id="sala-timer">ESTA SALA IRÁ EXPIRAR EM: --:--</div>
        </header>
        
        <div id="chat-window"></div>

        <div id="input-area">
            <input type="text" id="text-input" placeholder="Mensagem criptografada..." autocomplete="off">
            <button class="action-btn" id="btn-send" onclick="enviarTexto()">➤</button>
            <button class="action-btn" id="btn-mic">🎙</button>
        </div>
    </div>

    <script>
        const socket = io('https://arx-e8xb.onrender.com');
        let salaId = window.location.hash.substring(1) || Math.random().toString(36).substring(2, 10);
        window.location.hash = salaId;

        socket.on('connect', () => { socket.emit('entrar-na-sala', salaId); });

        // LÓGICA DO CONTADOR DE TEMPO DA SALA
        socket.on('info-sala', (dados) => {
            let segundosRestantes = Math.floor(dados.tempoRestante / 1000);
            const display = document.getElementById('sala-timer');

            const intervalo = setInterval(() => {
                let min = Math.floor(segundosRestantes / 60);
                let seg = segundosRestantes % 60;
                display.innerText = `ESTA SALA IRÁ EXPIRAR EM: ${min}:${seg < 10 ? '0' + seg : seg}`;
                
                if (segundosRestantes <= 0) {
                    clearInterval(intervalo);
                    alert("A sala expirou e foi destruída.");
                    window.location.reload();
                }
                segundosRestantes--;
            }, 1000);
        });

        socket.on('receber-mensagem', (dados) => {
            let conteudo = dados.conteudo;
            if (dados.formato === 'audio') {
                const blob = new Blob([dados.conteudo], { type: 'audio/webm' });
                conteudo = URL.createObjectURL(blob);
            }
            renderizarMensagem(conteudo, 'received', dados.formato);
        });

        function enviarTexto() {
            const texto = document.getElementById('text-input').value.trim();
            if (!texto) return;
            renderizarMensagem(texto, 'sent', 'text');
            socket.emit('enviar-mensagem', { salaId, conteudo: texto, formato: 'text' });
            document.getElementById('text-input').value = '';
        }

        function renderizarMensagem(conteudo, tipo, formato) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${tipo}`;
            const bubble = document.createElement('div');
            bubble.className = 'message';

            if (formato === 'text') bubble.innerText = conteudo;
            else {
                const audio = document.createElement('audio');
                audio.src = conteudo; audio.controls = true;
                bubble.appendChild(audio);
            }

            const bar = document.createElement('div');
            bar.className = 'timer-bar';
            bubble.appendChild(bar);
            wrapper.appendChild(bubble);
            document.getElementById('chat-window').appendChild(wrapper);
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;

            setTimeout(() => bar.style.width = '0%', 50);
            setTimeout(() => wrapper.remove(), 50000); // 50 segundos na tela
        }

        // --- GRAVAÇÃO DE ÁUDIO ---
        const btnMic = document.getElementById('btn-mic');
        let mediaRecorder, audioChunks = [];

        btnMic.addEventListener('touchstart', async (e) => {
            e.preventDefault();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                renderizarMensagem(url, 'sent', 'audio');
                socket.emit('enviar-mensagem', { salaId, conteudo: blob, formato: 'audio' });
            };
            mediaRecorder.start();
            btnMic.classList.add('recording');
        });

        btnMic.addEventListener('touchend', () => {
            mediaRecorder.stop();
            btnMic.classList.remove('recording');
        });
    </script>
</body>
</html>
